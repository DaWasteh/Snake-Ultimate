name: Snake Ultimate - Build & Deploy

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  GAME_VERSION: '1.0'
  BUILD_TIMESTAMP: ${{ github.event.head_commit.timestamp }}

jobs:
  lint:
    name: HTML Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: null

      - name: Install htmlhint
        run: npm install -g htmlhint

      - name: Run HTMLHint
        run: htmlhint --format compact snake_ultimate.html || true

  html-validate:
    name: HTML Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: null

      - name: Run html-validate
        run: npx --yes html-validate@latest snake_ultimate.html || true

  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: null

      - name: Create build artifact
        run: |
          mkdir -p build
          cp snake_ultimate.html build/index.html
          echo "Build completed at $(date -u)" > build/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> build/BUILD_INFO.txt
          echo "Branch: ${{ github.ref_name }}" >> build/BUILD_INFO.txt
          echo "Version: ${{ env.GAME_VERSION }}" >> build/BUILD_INFO.txt

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: snake-ultimate
          path: build/
          retention-days: 30
          if-no-files-found: error

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [lint, build]
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: snake-ultimate
          path: release-artifacts/

      - name: Create release archive
        run: |
          cd release-artifacts
          zip -r ../snake-ultimate-${{ github.event.release.tag_name }}.zip .

      - name: Upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./snake-ultimate-${{ github.event.release.tag_name }}.zip
          asset_name: snake-ultimate-${{ github.event.release.tag_name }}.zip
          asset_content_type: application/zip

  pages:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: snake-ultimate
          path: .

      - name: Upload and deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
