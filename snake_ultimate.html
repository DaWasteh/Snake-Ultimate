<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SNAKE ULTIMATE</title>
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Orbitron:wght@400;700&family=Press+Start+2P&family=Varela+Round&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS VARIABLES & THEMES ===== */
        :root {
            --bg-color: #0b0c10;
            --ui-accent: #45a29e;
            --text-color: #fff;
            --font-family: 'Orbitron', sans-serif;
            --menu-bg: rgba(0, 0, 0, 0.85);
            --border-style: 4px solid var(--ui-accent);
            --canvas-shadow: 0 0 20px var(--ui-accent);
            --maiden-color: #45a29e;
        }
        body[data-theme="cyberpunk"] {
            --bg-color: #07080a;
            --ui-accent: #00f3ff;
            --text-color: #e0ffff;
            --font-family: 'Orbitron', sans-serif;
            --canvas-shadow: 0 0 30px #00f3ff, inset 0 0 20px rgba(0, 243, 255, 0.2);
            --maiden-color: #ff0055;
        }
        body[data-theme="retro"] {
            --bg-color: #4a5c39;
            --ui-accent: #112211;
            --text-color: #112211;
            --font-family: 'Press Start 2P', monospace;
            --menu-bg: rgba(139, 172, 15, 0.95);
            --border-style: 10px solid #222;
            --canvas-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            --maiden-color: #112211;
        }
        body[data-theme="ocean"] {
            --bg-color: #001a33;
            --ui-accent: #00ffcc;
            --text-color: #e6ffff;
            --font-family: 'Varela Round', sans-serif;
            --menu-bg: rgba(0, 26, 51, 0.85);
            --border-style: 8px solid #0059b3;
            --canvas-shadow: 0 0 40px rgba(0, 255, 204, 0.3);
            --maiden-color: #000033;
        }
        body[data-theme="inferno"] {
            --bg-color: #1a0000;
            --ui-accent: #ff3300;
            --text-color: #ffb3b3;
            --font-family: 'Creepster', cursive;
            --menu-bg: rgba(26, 0, 0, 0.9);
            --border-style: 4px dashed #ff3300;
            --canvas-shadow: 0 0 50px rgba(255, 0, 0, 0.6);
            --maiden-color: #4d0000;
        }
        body[data-theme="pvz"] {
            --bg-color: #2d5a27;
            --ui-accent: #76c843;
            --text-color: #ffcc00;
            --font-family: 'Varela Round', sans-serif;
            --menu-bg: rgba(45, 90, 39, 0.9);
            --border-style: 6px solid #76c843;
            --canvas-shadow: 0 0 30px rgba(118, 200, 67, 0.4);
            --maiden-color: #8b4513;
        }

        /* ===== BASE ===== */
        *, *::before, *::after { box-sizing: border-box; }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            margin: 0;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
            overflow: hidden;
            transition: background-color 0.5s, color 0.5s;
            -webkit-tap-highlight-color: transparent;
        }

        /* ===== TOP BAR ===== */
        .top-bar {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 2px solid var(--ui-accent);
            flex-shrink: 0;
            transition: all 0.3s;
        }
        body[data-theme="retro"] .top-bar {
            background: #8bac0f;
            border-bottom: 4px solid #112211;
        }
        .top-bar h1 {
            margin: 0;
            font-size: clamp(14px, 3vw, 24px);
            color: var(--ui-accent);
            white-space: nowrap;
        }
        .controls-wrapper {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        select {
            background-color: var(--menu-bg);
            color: var(--ui-accent);
            border: 2px solid var(--ui-accent);
            padding: 6px 10px;
            font-size: clamp(11px, 1.5vw, 14px);
            font-family: var(--font-family);
            border-radius: 5px;
            outline: none;
            cursor: pointer;
            touch-action: manipulation;
        }

        /* ===== GAME WRAPPER ===== */
        .game-wrapper {
            width: 100%;
            flex: 1;
            min-height: 0;
            padding: 8px 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* ===== SCORE BOARD ===== */
        .score-board {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: clamp(20px, 8vw, 80px);
            margin-bottom: 8px;
            text-shadow: 1px 1px 2px #000;
            flex-shrink: 0;
        }
        .player-hud {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .score-text { font-size: clamp(16px, 3vw, 36px); }
        .hunger-track {
            width: 80px;
            height: 6px;
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid var(--ui-accent);
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }
        .hunger-fill {
            height: 100%;
            width: 100%;
            background: #ff0000;
            transition: width 0.1s linear;
        }
        #hud1 .score-text { color: var(--ui-accent); }
        #hud2 .score-text { color: #ff00ff; }
        #hud2 { display: none; }
        body[data-theme="retro"] .score-text { color: #112211 !important; text-shadow: none; }
        body[data-theme="retro"] .hunger-track { border-color: #112211; border-radius: 0; }

        /* ===== GAME CONTAINER ===== */
        .game-container {
            position: relative;
            /* FIX: Proper height-constrained sizing so canvas never overflows */
            width: min(calc(100vw - 40px), calc((100dvh - 90px - 50px) * 4 / 3));
            aspect-ratio: 4 / 3;
            flex-shrink: 0;
        }

        canvas {
            border: var(--border-style);
            box-shadow: var(--canvas-shadow);
            border-radius: 8px;
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; /* Prevents scroll interference on canvas */
        }
        body[data-theme="retro"] canvas { border-radius: 0; }

        /* ===== OVERLAY ===== */
        .overlay {
            position: absolute;
            inset: 0;
            background-color: var(--menu-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            border-radius: 8px;
            backdrop-filter: blur(4px);
            z-index: 200;
            gap: 0;
        }
        body[data-theme="retro"] .overlay { backdrop-filter: none; border-radius: 0; }
        #gameOver { display: none; }
        .overlay h2 {
            font-size: clamp(20px, 4vw, 54px);
            margin: 0 0 12px;
            text-align: center;
        }

        /* ===== MODE TOGGLE ===== */
        .mode-toggle {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .mode-btn {
            background: transparent;
            border: 2px solid #555;
            color: #888;
            padding: clamp(5px, 1vw, 10px) clamp(10px, 2vw, 20px);
            font-size: clamp(11px, 1.5vw, 16px);
            font-family: var(--font-family);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        body[data-theme="retro"] .mode-btn { border-radius: 0; }
        .mode-btn.active {
            border-color: var(--ui-accent);
            color: var(--ui-accent);
            background: rgba(255,255,255,0.1);
        }

        /* ===== MENU GRIDS ===== */
        /* Merged into single row - both diff & addon side by side */
        .menu-grids {
            display: flex;
            flex-direction: row;
            gap: 20px;
            margin-bottom: 8px;
            width: min(90%, 560px);
            justify-content: center;
        }
        .diff-buttons, .addon-buttons {
            display: flex;
            flex-direction: column;
            gap: 7px;
            flex: 1;
        }
        .menu-col-title {
            text-align: center;
            font-size: clamp(10px, 1.2vw, 13px);
            color: var(--ui-accent);
            opacity: 0.8;
            margin-bottom: 3px;
            text-transform: uppercase;
        }

        /* ===== ACTION BUTTONS ===== */
        button.action-btn {
            background-color: transparent;
            border: 2px solid var(--ui-accent);
            color: var(--ui-accent);
            padding: clamp(7px, 1vw, 11px) clamp(8px, 1.2vw, 14px);
            font-size: clamp(11px, 1.3vw, 16px);
            font-family: var(--font-family);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.15s;
            opacity: 0.55;
            touch-action: manipulation;        /* FIX: removes 300ms tap delay */
            -webkit-tap-highlight-color: transparent;
        }
        body[data-theme="retro"] button.action-btn { border-radius: 0; }
        button.action-btn:hover, button.action-btn.selected {
            background-color: var(--ui-accent);
            color: var(--bg-color);
            opacity: 1;
        }
        button.action-btn:active { transform: scale(0.97); }

        button.addon-btn { border-style: dashed; }
        button.addon-btn.active-addon {
            background-color: rgba(69, 162, 158, 0.2);
            border-style: solid;
            opacity: 1;
            box-shadow: 0 0 8px var(--ui-accent);
        }
        button.addon-btn.locked-addon {
            border-color: #ff0000 !important;
            color: #ff0000 !important;
            background-color: rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 8px #ff0000;
            opacity: 1;
            border-style: solid;
            pointer-events: none;
        }
        button.btn-nightmare {
            border-color: #ff0000 !important;
            color: #ff0000 !important;
            animation: pulse 1.5s infinite;
        }
        button.btn-nightmare:hover, button.btn-nightmare.selected {
            background-color: #ff0000 !important;
            color: #fff !important;
        }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70%  { box-shadow: 0 0 0 8px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        #startGameBtn {
            margin-top: 8px;
            opacity: 1 !important;
            background-color: var(--ui-accent) !important;
            color: var(--bg-color) !important;
            font-weight: bold;
            letter-spacing: 0.05em;
        }
        .legend {
            margin-top: 8px;
            font-size: clamp(9px, 1.1vw, 13px);
            text-align: center;
            opacity: 0.7;
            line-height: 1.6;
        }

        /* ===== D-PAD (Mobile Controls) ===== */
        #dpad {
            display: none;          /* Hidden by default */
            flex-direction: column;
            align-items: center;
            gap: 3px;
            margin-top: 8px;
            user-select: none;
            -webkit-user-select: none;
            flex-shrink: 0;
        }
        #dpad.visible { display: flex; }
        .dpad-row {
            display: flex;
            gap: 3px;
            align-items: center;
        }
        .dpad-btn {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid var(--ui-accent);
            color: var(--ui-accent);
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: background 0.08s, transform 0.08s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .dpad-btn:active {
            background: var(--ui-accent);
            color: var(--bg-color);
            transform: scale(0.93);
        }
        .dpad-center { width: 56px; height: 56px; }
        body[data-theme="retro"] .dpad-btn { border-radius: 0; }

        /* ===== RESPONSIVE: PORTRAIT PHONE (≤600px) ===== */
        @media (max-width: 600px) and (orientation: portrait) {
            .top-bar { padding: 7px 12px; }
            .top-bar h1 { font-size: 13px; }

            .game-wrapper { padding: 5px 8px 6px; }

            .score-board { margin-bottom: 5px; gap: 20px; }
            .score-text { font-size: 15px !important; }
            .hunger-track { width: 55px; height: 4px; }

            .game-container {
                /* Leave room: topbar~55px, score~35px, dpad~175px, gaps~25px = 290px overhead */
                width: min(calc(100vw - 16px), calc((100dvh - 290px) * 4 / 3));
            }

            /* FIX: overlay becomes fixed full-screen + scrollable on portrait mobile */
            .overlay {
                position: fixed;
                inset: 0;
                border-radius: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                justify-content: flex-start;
                padding: 14px 12px 20px;
                gap: 3px;
            }
            .overlay h2 { font-size: 20px !important; margin-bottom: 10px; }

            .mode-toggle { margin-bottom: 10px; gap: 8px; }
            .mode-btn { font-size: 12px; padding: 8px 14px; }

            /* On portrait: keep two columns but compact */
            .menu-grids { gap: 8px; width: 100%; margin-bottom: 6px; }
            .menu-col-title { font-size: 10px; }
            button.action-btn { padding: 9px 6px; font-size: 11px; }

            #startGameBtn {
                width: 100%;
                padding: 13px;
                font-size: 15px;
                margin-top: 8px;
            }
            .legend { font-size: 9px; margin-top: 6px; }

            /* Hide keyboard-only legend on touch */
            #keyboardLegend { display: none; }

            /* D-pad visible during play */
            #dpad.visible { display: flex; }
            .dpad-btn { width: 60px; height: 60px; font-size: 22px; }
            .dpad-center { width: 60px; height: 60px; }
        }

        /* ===== RESPONSIVE: LANDSCAPE PHONE (height ≤500px) ===== */
        @media (max-height: 500px) and (orientation: landscape) {
            .top-bar { padding: 4px 12px; }
            .top-bar h1 { font-size: 11px; }
            select { padding: 4px 8px; font-size: 10px; }

            .game-wrapper { padding: 3px 8px 4px; }

            .score-board { margin-bottom: 3px; gap: 15px; }
            .score-text { font-size: 13px !important; }
            .hunger-track { height: 4px; width: 45px; }

            /* Canvas: full height minus top-bar and score */
            .game-container {
                width: min(calc(100vw - 16px), calc((100dvh - 46px - 32px) * 4 / 3));
            }

            /* FIX: full-screen fixed overlay on landscape so menu doesn't clip */
            .overlay {
                position: fixed;
                inset: 0;
                border-radius: 0;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
                justify-content: flex-start;
                padding: 8px 12px 10px;
                gap: 3px;
            }
            .overlay h2 { font-size: 15px !important; margin-bottom: 6px; }

            .mode-toggle { flex-direction: row; gap: 8px; margin-bottom: 6px; }
            .mode-btn { font-size: 10px; padding: 4px 10px; }

            /* Two columns stay side by side in landscape */
            .menu-grids { flex-direction: row; gap: 10px; width: min(90%, 480px); margin-bottom: 5px; }
            .menu-col-title { font-size: 9px; }
            button.action-btn { padding: 5px 6px; font-size: 10px; }

            #startGameBtn { padding: 7px 20px; font-size: 12px; margin-top: 5px; }
            .legend { font-size: 8px; margin-top: 4px; }
            #keyboardLegend { display: none; }

            /* D-pad: fixed to bottom-right during play in landscape */
            #dpad.visible {
                display: flex;
                position: fixed;
                right: 10px;
                bottom: 10px;
                z-index: 50;
                background: rgba(0,0,0,0.3);
                border-radius: 12px;
                padding: 4px;
            }
            .dpad-btn { width: 44px; height: 44px; font-size: 16px; }
            .dpad-center { width: 44px; height: 44px; }
        }

        /* ===== RESPONSIVE: TABLET (601–1024px) ===== */
        @media (min-width: 601px) and (max-width: 1024px) {
            .game-container {
                width: min(calc(100vw - 40px), calc((100dvh - 85px - 55px) * 4 / 3));
            }
            /* Show D-pad on touch tablets */
            @media (pointer: coarse) {
                #dpad.visible { display: flex; }
            }
        }
    </style>
</head>
<body data-theme="cyberpunk">

    <div class="top-bar">
        <h1>SNAKE ULTIMATE</h1>
        <div class="controls-wrapper">
            <label for="themeSelect">STYLE:</label>
            <!-- FIX: Added missing PvZ option to dropdown -->
            <select id="themeSelect" onchange="changeTheme(this.value)">
                <option value="cyberpunk">Neon Cyberpunk</option>
                <option value="retro">Classic 3310</option>
                <option value="ocean">Deep Sea</option>
                <option value="inferno">Inferno Blood</option>
                <option value="pvz">Plants vs Zombies</option>
            </select>
        </div>
    </div>

    <div class="game-wrapper">
        <div class="score-board">
            <div class="player-hud" id="hud1">
                <div class="score-text" id="score1">P1: 0</div>
                <div class="hunger-track" id="ht1"><div class="hunger-fill" id="hf1"></div></div>
            </div>
            <div class="player-hud" id="hud2">
                <div class="score-text" id="score2">P2: 0</div>
                <div class="hunger-track" id="ht2"><div class="hunger-fill" id="hf2"></div></div>
            </div>
        </div>

        <div class="game-container">
            <canvas id="gameCanvas" width="800" height="600"></canvas>

            <!-- Main Menu -->
            <div class="overlay" id="mainMenu">
                <h2>SNAKE ULTIMATE</h2>

                <div class="mode-toggle">
                    <button class="mode-btn active" id="btnSingle" onclick="setMode('single')">1 SPIELER</button>
                    <button class="mode-btn" id="btnMulti" onclick="setMode('multi')">2 SPIELER</button>
                </div>

                <!-- Speed + Addons side by side -->
                <div class="menu-grids">
                    <div class="diff-buttons">
                        <div class="menu-col-title">GESCHWINDIGKEIT</div>
                        <button class="action-btn" id="btn-easy"      onclick="setDifficulty('easy')">LEICHT</button>
                        <button class="action-btn" id="btn-medium"    onclick="setDifficulty('medium')">MITTEL</button>
                        <button class="action-btn" id="btn-fast"      onclick="setDifficulty('fast')">SCHNELL</button>
                        <button class="action-btn" id="btn-ultra"     onclick="setDifficulty('ultra')">ULTRA</button>
                        <button class="action-btn btn-nightmare" id="btn-nightmare" onclick="setDifficulty('nightmare')">ALBTRAUM</button>
                    </div>
                    <div class="addon-buttons">
                        <div class="menu-col-title">ADDONS (Toggles)</div>
                        <button class="action-btn addon-btn" id="btn-addon-obstacles" onclick="toggleAddon('obstacles')">[1] HINDERNISSE</button>
                        <button class="action-btn addon-btn" id="btn-addon-hunger"    onclick="toggleAddon('hunger')">[2] HUNGER</button>
                        <button class="action-btn addon-btn" id="btn-addon-maiden"    onclick="toggleAddon('maiden')">[3] EIS. JUNGFRAU</button>
                    </div>
                </div>

                <button class="action-btn" id="startGameBtn" onclick="startGame()">▶ SPIEL STARTEN</button>

                <!-- Hidden on mobile via CSS (keyboard-only hints) -->
                <p class="legend" id="keyboardLegend">
                    [↑/↓] Tempo | [1,2,3] Addons | [ALT GR] 1/2 Spieler | [+/-] Style<br>
                    [LEERTASTE] = Spiel Starten
                </p>
            </div>

            <!-- Game Over -->
            <div class="overlay" id="gameOver">
                <h2 id="winnerText" style="color: #ff3333;">GAME OVER</h2>
                <h3 id="finalScore" style="margin-bottom: 18px;">Score: 0</h3>
                <!-- FIX: Two clearly labeled buttons for touch users -->
                <div style="display:flex; gap:12px; flex-wrap:wrap; justify-content:center;">
                    <button class="action-btn" style="opacity:1;" onclick="startGame()">↺ NOCHMAL</button>
                    <button class="action-btn" style="opacity:1;" onclick="showMenu()">☰ HAUPTMENÜ</button>
                </div>
                <p class="legend" id="keyboardLegendGO" style="margin-top:12px;">
                    [LEERTASTE] = Retry | [STRG] = Hauptmenü
                </p>
            </div>
        </div>

        <!-- D-Pad (shown during play on touch devices) -->
        <div id="dpad">
            <div class="dpad-row">
                <button class="dpad-btn" id="dpad-up">▲</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="dpad-left">◀</button>
                <div class="dpad-center"></div>
                <button class="dpad-btn" id="dpad-right">▶</button>
            </div>
            <div class="dpad-row">
                <button class="dpad-btn" id="dpad-down">▼</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const TILE_SIZE = 20;
        const COLS = canvas.width / TILE_SIZE;   // 40
        const ROWS = canvas.height / TILE_SIZE;  // 30

        let gameState = 'MENU';
        let gameLoop;
        let isMultiplayer = false;

        let currentDifficulty = 'medium';
        const difficultiesList = ['easy', 'medium', 'fast', 'ultra', 'nightmare'];
        let currentTheme = 'cyberpunk';
        const themesList = ['cyberpunk', 'retro', 'ocean', 'inferno', 'pvz'];

        let userAddons   = { obstacles: false, hunger: false, maiden: false };
        let activeAddons = { obstacles: false, hunger: false, maiden: false };

        let p1, p2, food, obstacles, hunter;
        let frameCount = 0;
        let graceTicks  = 0;

        // Eiserne Jungfrau
        let maidenSpiral   = [];
        let maidenProgress = 0;
        let maidenTick     = 0;

        // ── D-PAD VISIBILITY ──────────────────────────────────────────────
        function updateDpad() {
            const dpad = document.getElementById('dpad');
            if (!dpad) return;
            // Show only on touch devices while playing
            const isTouch = window.matchMedia('(pointer: coarse)').matches;
            dpad.classList.toggle('visible', isTouch && gameState === 'PLAYING');
        }

        // ── MAIDEN SPIRAL ─────────────────────────────────────────────────
        function generateMaidenSpiral() {
            maidenSpiral = [];
            let top = 0, bottom = ROWS - 1, left = 0, right = COLS - 1;
            while (top <= bottom && left <= right) {
                for (let i = left;  i <= right;  i++) maidenSpiral.push({x: i, y: top});
                top++;
                for (let i = top;   i <= bottom; i++) maidenSpiral.push({x: right, y: i});
                right--;
                if (top <= bottom) {
                    for (let i = right; i >= left; i--) maidenSpiral.push({x: i, y: bottom});
                    bottom--;
                }
                if (left <= right) {
                    for (let i = bottom; i >= top; i--) maidenSpiral.push({x: left, y: i});
                    left++;
                }
            }
        }

        // ── THEME ─────────────────────────────────────────────────────────
        function changeTheme(themeName) {
            currentTheme = themeName;
            document.body.setAttribute('data-theme', themeName);
            if (!gameLoop) draw();
        }

        // ── MODE ──────────────────────────────────────────────────────────
        function setMode(mode) {
            isMultiplayer = (mode === 'multi');
            document.getElementById('btnSingle').classList.toggle('active', !isMultiplayer);
            document.getElementById('btnMulti').classList.toggle('active',  isMultiplayer);
            document.getElementById('hud2').style.display = isMultiplayer ? 'flex' : 'none';
        }

        // ── DIFFICULTY ────────────────────────────────────────────────────
        function setDifficulty(diff) {
            currentDifficulty = diff;
            updateMenuSelection();
        }

        function toggleAddon(addon) {
            if (currentDifficulty === 'nightmare') return;
            userAddons[addon] = !userAddons[addon];
            updateMenuSelection();
        }

        function updateMenuSelection() {
            difficultiesList.forEach(diff => {
                const btn = document.getElementById('btn-' + diff);
                if (btn) btn.classList.toggle('selected', diff === currentDifficulty);
            });
            const isNightmare = (currentDifficulty === 'nightmare');
            ['obstacles', 'hunger', 'maiden'].forEach(id => {
                const btn = document.getElementById('btn-addon-' + id);
                btn.classList.remove('active-addon', 'locked-addon');
                if (isNightmare)      btn.classList.add('locked-addon');
                else if (userAddons[id]) btn.classList.add('active-addon');
            });
        }

        // ── ENTITIES ──────────────────────────────────────────────────────
        function initEntities() {
            p1 = {
                body: [{x: 10, y: Math.floor(ROWS/2)}],
                dir: 'RIGHT', inputQueue: [], score: 0, dead: false, hungerTicks: 0, foodEaten: 0
            };
            p2 = {
                body: [{x: COLS - 11, y: Math.floor(ROWS/2)}],
                dir: 'LEFT', inputQueue: [], score: 0, dead: !isMultiplayer, hungerTicks: 0, foodEaten: 0
            };
            obstacles = [];
            hunter = { active: false, x: 0, y: 0, moveCounter: 0 };
            generateMaidenSpiral();
            maidenProgress = 0;
            maidenTick     = 0;
            spawnFood();
        }

        function spawnFood() {
            let valid = false, attempts = 0, newX, newY;
            while (!valid && attempts < 1000) {
                newX = Math.floor(Math.random() * COLS);
                newY = Math.floor(Math.random() * ROWS);
                valid = !isOccupied(newX, newY, false);
                attempts++;
            }
            food = valid ? { x: newX, y: newY } : { x: -999, y: -999 };
        }

        function spawnObstacle() {
            let valid = false, attempts = 0;
            while (!valid && attempts < 100) {
                let obs = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
                let dP1 = Math.abs(obs.x - p1.body[0].x) + Math.abs(obs.y - p1.body[0].y);
                let dP2 = isMultiplayer && !p2.dead ? Math.abs(obs.x - p2.body[0].x) + Math.abs(obs.y - p2.body[0].y) : 10;
                if (!isOccupied(obs.x, obs.y) && dP1 > 5 && dP2 > 5) { obstacles.push(obs); valid = true; }
                attempts++;
            }
        }

        function isOccupied(x, y, checkFood = true) {
            if (p1 && p1.body.some(s => s.x === x && s.y === y)) return true;
            if (isMultiplayer && p2 && p2.body.some(s => s.x === x && s.y === y)) return true;
            if (activeAddons.obstacles && obstacles && obstacles.some(o => o.x === x && o.y === y)) return true;
            if (checkFood && food && food.x === x && food.y === y) return true;
            if (activeAddons.maiden) {
                for (let i = 0; i < maidenProgress; i++) {
                    if (maidenSpiral[i].x === x && maidenSpiral[i].y === y) return true;
                }
            }
            return false;
        }

        // ── GAME FLOW ─────────────────────────────────────────────────────
        function startGame() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('gameOver').style.display = 'none';
            gameState = 'PLAYING';
            updateDpad();

            if (currentDifficulty === 'nightmare') {
                activeAddons = { obstacles: true, hunger: true, maiden: true };
            } else {
                activeAddons = { ...userAddons };
            }

            document.getElementById('ht1').style.display = activeAddons.hunger ? 'block' : 'none';
            document.getElementById('ht2').style.display = activeAddons.hunger ? 'block' : 'none';

            initEntities();

            let speed = 100;
            switch (currentDifficulty) {
                case 'easy':      speed = 150; break;
                case 'medium':    speed = 100; break;
                case 'fast':      speed =  70; break;
                case 'ultra':     speed =  45; break;
                case 'nightmare':
                    speed = 35;
                    hunter.active = true;
                    hunter.x = Math.floor(COLS / 2);
                    hunter.y = Math.floor(ROWS / 2);
                    break;
            }

            graceTicks   = Math.floor(1000 / speed);
            p1.hungerTicks = -graceTicks;
            p2.hungerTicks = -graceTicks;

            updateScoreboard();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }

        function showMenu() {
            if (gameLoop) { clearInterval(gameLoop); gameLoop = null; }
            gameState = 'MENU';
            document.getElementById('gameOver').style.display  = 'none';
            document.getElementById('mainMenu').style.display  = 'flex';
            updateMenuSelection();
            updateDpad();
            draw(); // Draw idle background
            // FIX: No dynamic event listeners added here.
            // startGameBtn already has onclick="startGame()" in HTML.
        }

        function updateScoreboard() {
            document.getElementById('score1').innerText = `P1: ${p1.score}`;
            if (isMultiplayer) document.getElementById('score2').innerText = `P2: ${p2.score}`;
        }

        function updateHungerUI() {
            if (!activeAddons.hunger) return;
            const maxHunger = 50;
            const pct1 = Math.max(0, Math.min(100, 100 - (p1.hungerTicks / maxHunger) * 100));
            document.getElementById('hf1').style.width = pct1 + '%';
            if (isMultiplayer) {
                const pct2 = Math.max(0, Math.min(100, 100 - (p2.hungerTicks / maxHunger) * 100));
                document.getElementById('hf2').style.width = pct2 + '%';
            }
        }

        // ── GAME LOGIC ────────────────────────────────────────────────────
        function moveSnake(snake) {
            if (snake.dead) return;
            if (snake.inputQueue.length > 0) snake.dir = snake.inputQueue.shift();

            const head = { ...snake.body[0] };
            if (snake.dir === 'RIGHT') head.x++;
            else if (snake.dir === 'LEFT')  head.x--;
            else if (snake.dir === 'UP')    head.y--;
            else if (snake.dir === 'DOWN')  head.y++;

            snake.body.unshift(head);

            let ateFood = false;
            if (head.x === food.x && head.y === food.y) {
                snake.score += 10;
                snake.foodEaten++;
                ateFood = true;
                snake.hungerTicks = -graceTicks;
                spawnFood();
                if (activeAddons.obstacles && snake.foodEaten % 3 === 0) spawnObstacle();
                if (activeAddons.maiden) maidenProgress = Math.max(0, maidenProgress - 5);
                updateScoreboard();
            } else {
                snake.body.pop();
            }

            if (activeAddons.hunger && !ateFood) {
                snake.hungerTicks++;
                if (snake.hungerTicks >= 50) {
                    snake.hungerTicks = 0;
                    if (snake.body.length > 1) {
                        snake.body.pop();
                        snake.score = Math.max(0, snake.score - 5);
                        updateScoreboard();
                    } else {
                        snake.dead = true;
                    }
                }
            }
        }

        function checkCollisions() {
            [p1, p2].forEach(snake => {
                if (snake.dead) return;
                const head = snake.body[0];
                if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) snake.dead = true;
                for (let i = 1; i < snake.body.length; i++) {
                    if (head.x === snake.body[i].x && head.y === snake.body[i].y) snake.dead = true;
                }
                if (activeAddons.obstacles && obstacles.some(o => o.x === head.x && o.y === head.y)) snake.dead = true;
                if (activeAddons.maiden) {
                    for (let i = 0; i < maidenProgress; i++) {
                        if (maidenSpiral[i].x === head.x && maidenSpiral[i].y === head.y) snake.dead = true;
                    }
                }
                if (hunter.active && head.x === hunter.x && head.y === hunter.y) snake.dead = true;
            });

            if (isMultiplayer && !p1.dead && !p2.dead) {
                const h1 = p1.body[0], h2 = p2.body[0];
                if (h1.x === h2.x && h1.y === h2.y) { p1.dead = true; p2.dead = true; }
                else {
                    if (p2.body.some(s => s.x === h1.x && s.y === h1.y)) p1.dead = true;
                    if (p1.body.some(s => s.x === h2.x && s.y === h2.y)) p2.dead = true;
                }
            }
        }

        function updateHunterAndMaiden() {
            if (hunter.active) {
                hunter.moveCounter++;
                if (hunter.moveCounter >= 3) {
                    hunter.moveCounter = 0;
                    let target = p1.body[0];
                    if (isMultiplayer && !p2.dead) {
                        let d1 = p1.dead ? 9999 : Math.abs(p1.body[0].x - hunter.x) + Math.abs(p1.body[0].y - hunter.y);
                        let d2 = Math.abs(p2.body[0].x - hunter.x) + Math.abs(p2.body[0].y - hunter.y);
                        if (d2 < d1) target = p2.body[0];
                    }
                    if (target) {
                        if (hunter.x < target.x)      hunter.x++;
                        else if (hunter.x > target.x) hunter.x--;
                        else if (hunter.y < target.y) hunter.y++;
                        else if (hunter.y > target.y) hunter.y--;
                    }
                }
            }

            if (activeAddons.maiden) {
                maidenTick++;
                if (maidenTick >= 15) {
                    maidenTick = 0;
                    if (maidenProgress < maidenSpiral.length) maidenProgress++;
                }
                if (food.x !== -999 && isOccupied(food.x, food.y, false)) spawnFood();
            }
        }

        function update() {
            frameCount++;
            moveSnake(p1);
            if (isMultiplayer) moveSnake(p2);
            updateHunterAndMaiden();
            checkCollisions();
            updateHungerUI();

            if ((!isMultiplayer && p1.dead) || (isMultiplayer && p1.dead && p2.dead)) {
                endGame('GAME OVER', `P1: ${p1.score}`);
            } else if (isMultiplayer) {
                if (p1.dead && !p2.dead) endGame('SPIELER 2 GEWINNT!', `P2: ${p2.score}`);
                if (p2.dead && !p1.dead) endGame('SPIELER 1 GEWINNT!', `P1: ${p1.score}`);
            }
            draw();
        }

        function endGame(titleText, scoreText) {
            clearInterval(gameLoop);
            gameLoop  = null;
            gameState = 'GAMEOVER';
            document.getElementById('winnerText').innerText = titleText;
            document.getElementById('finalScore').innerText = scoreText;
            document.getElementById('gameOver').style.display = 'flex';
            updateDpad();
        }

        /* ═══════════════════════════════════════════════════════════════
           DRAWING LOGIC  (untouched from original)
        ═══════════════════════════════════════════════════════════════ */
        function draw() {
            ctx.shadowBlur = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if      (currentTheme === 'cyberpunk') drawCyberpunk();
            else if (currentTheme === 'retro')     drawRetro();
            else if (currentTheme === 'ocean')     drawOcean();
            else if (currentTheme === 'inferno')   drawInferno();
            else if (currentTheme === 'pvz')       drawPvZ();
        }

        // ── CYBERPUNK ─────────────────────────────────────────────────────
        function drawCyberpunk() {
            ctx.fillStyle = '#0a0f14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(0, 243, 255, 0.05)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let x = 0; x < canvas.width;  x += TILE_SIZE) { ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); }
            for (let y = 0; y < canvas.height; y += TILE_SIZE) { ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); }
            ctx.stroke();
            if (!gameLoop) return;

            if (activeAddons.maiden) {
                ctx.fillStyle  = getComputedStyle(document.documentElement).getPropertyValue('--maiden-color').trim();
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                for (let i = 0; i < maidenProgress; i++) {
                    ctx.fillRect(maidenSpiral[i].x*TILE_SIZE+2, maidenSpiral[i].y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
                }
            }

            if (food.x !== -999) {
                ctx.fillStyle   = '#ff003c';
                ctx.shadowBlur  = 15;
                ctx.shadowColor = '#ff003c';
                ctx.beginPath();
                ctx.moveTo(food.x*TILE_SIZE+10, food.y*TILE_SIZE+2);
                ctx.lineTo(food.x*TILE_SIZE+18, food.y*TILE_SIZE+10);
                ctx.lineTo(food.x*TILE_SIZE+10, food.y*TILE_SIZE+18);
                ctx.lineTo(food.x*TILE_SIZE+2,  food.y*TILE_SIZE+10);
                ctx.fill();
            }

            if (activeAddons.obstacles) {
                ctx.shadowBlur  = 0;
                ctx.fillStyle   = '#444';
                ctx.strokeStyle = '#00f3ff';
                ctx.lineWidth   = 2;
                obstacles.forEach(o => {
                    ctx.fillRect(o.x*TILE_SIZE+2, o.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
                    ctx.strokeRect(o.x*TILE_SIZE+2, o.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
                });
            }

            const drawSnake = (snake, color) => {
                if (snake.dead) return;
                ctx.fillStyle   = color;
                ctx.shadowColor = color;
                snake.body.forEach((seg, i) => {
                    ctx.shadowBlur = i === 0 ? 15 : 5;
                    ctx.fillRect(seg.x*TILE_SIZE+1, seg.y*TILE_SIZE+1, TILE_SIZE-2, TILE_SIZE-2);
                });
            };
            drawSnake(p1, '#00f3ff');
            if (isMultiplayer) drawSnake(p2, '#ff00ff');

            if (hunter.active) {
                ctx.fillStyle   = '#ff0000';
                ctx.shadowBlur  = 20;
                ctx.shadowColor = '#ff0000';
                ctx.fillRect(hunter.x*TILE_SIZE+2, hunter.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
            }
        }

        // ── RETRO 3310 ────────────────────────────────────────────────────
        function drawRetro() {
            ctx.fillStyle = '#8bac0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!gameLoop) return;

            const pixelColor = '#112211';

            if (activeAddons.maiden) {
                ctx.fillStyle = pixelColor;
                for (let i = 0; i < maidenProgress; i++) {
                    ctx.fillRect(maidenSpiral[i].x*TILE_SIZE, maidenSpiral[i].y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#8bac0f';
                    ctx.fillRect(maidenSpiral[i].x*TILE_SIZE+2, maidenSpiral[i].y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
                    ctx.fillStyle = pixelColor;
                }
            }

            if (food.x !== -999 && Math.floor(frameCount / 3) % 2 === 0) {
                ctx.fillStyle = pixelColor;
                ctx.fillRect(food.x*TILE_SIZE+2, food.y*TILE_SIZE+2, TILE_SIZE-4, TILE_SIZE-4);
            }

            if (activeAddons.obstacles) {
                ctx.fillStyle = pixelColor;
                obstacles.forEach(o => {
                    ctx.fillRect(o.x*TILE_SIZE, o.y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    ctx.fillStyle = '#8bac0f';
                    ctx.fillRect(o.x*TILE_SIZE+4, o.y*TILE_SIZE+4, TILE_SIZE-8, TILE_SIZE-8);
                    ctx.fillStyle = pixelColor;
                });
            }

            const drawSnake = (snake) => {
                if (snake.dead) return;
                ctx.fillStyle = pixelColor;
                snake.body.forEach(seg => {
                    ctx.fillRect(seg.x*TILE_SIZE+1, seg.y*TILE_SIZE+1, TILE_SIZE-2, TILE_SIZE-2);
                });
            };
            drawSnake(p1);
            if (isMultiplayer) drawSnake(p2);

            if (hunter.active) {
                ctx.fillStyle = pixelColor;
                let hx = hunter.x*TILE_SIZE, hy = hunter.y*TILE_SIZE;
                ctx.fillRect(hx+4, hy+2, 12, 10);
                ctx.fillRect(hx+6, hy+12, 8, 4);
                ctx.fillStyle = '#8bac0f';
                ctx.fillRect(hx+6,  hy+6, 3, 3);
                ctx.fillRect(hx+11, hy+6, 3, 3);
            }
        }

        // ── OCEAN ─────────────────────────────────────────────────────────
        function drawOcean() {
            let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, '#003366');
            grad.addColorStop(1, '#00001a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!gameLoop) return;

            if (activeAddons.maiden) {
                ctx.fillStyle = '#000033';
                for (let i = 0; i < maidenProgress; i++) {
                    ctx.fillRect(maidenSpiral[i].x*TILE_SIZE, maidenSpiral[i].y*TILE_SIZE, TILE_SIZE, TILE_SIZE);
                }
            }

            if (food.x !== -999) {
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(food.x*TILE_SIZE+10, food.y*TILE_SIZE+10, 8, 0, Math.PI*2);
                ctx.fill();
            }

            if (activeAddons.obstacles) {
                ctx.fillStyle = '#002244';
                obstacles.forEach(o => {
                    ctx.beginPath();
                    ctx.arc(o.x*TILE_SIZE+10, o.y*TILE_SIZE+10, 9, 0, Math.PI*2);
                    ctx.fill();
                });
            }

            const drawSnake = (snake, color) => {
                if (snake.dead) return;
                ctx.fillStyle = color;
                snake.body.forEach((seg, i) => {
                    ctx.beginPath();
                    ctx.arc(seg.x*TILE_SIZE+10, seg.y*TILE_SIZE+10, i === 0 ? 10 : 8, 0, Math.PI*2);
                    ctx.fill();
                });
            };
            drawSnake(p1, '#00ffff');
            if (isMultiplayer) drawSnake(p2, '#ff9900');

            if (hunter.active) {
                ctx.fillStyle = '#ff0000';
                ctx.beginPath();
                ctx.ellipse(hunter.x*TILE_SIZE+10, hunter.y*TILE_SIZE+10, 10, 6, 0, 0, Math.PI*2);
                ctx.fill();
            }
        }

        // ── INFERNO ───────────────────────────────────────────────────────
        function drawInferno() {
            ctx.fillStyle = '#1a0000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (!gameLoop) return;

            if (activeAddons.maiden) {
                ctx.fillStyle = '#4d0000';
                for (let i = 0; i < maidenProgress; i++) {
                    let mx = maidenSpiral[i].x*TILE_SIZE, my = maidenSpiral[i].y*TILE_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(mx, my); ctx.lineTo(mx+20, my); ctx.lineTo(mx+10, my+10);
                    ctx.fill();
                    ctx.fillRect(mx, my+10, 20, 10);
                }
            }

            if (food.x !== -999) {
                let pulse = Math.sin(frameCount * 0.2) * 3;
                ctx.fillStyle   = '#ff9900';
                ctx.shadowBlur  = 10 + pulse;
                ctx.shadowColor = '#ff9900';
                ctx.beginPath();
                ctx.arc(food.x*TILE_SIZE+10, food.y*TILE_SIZE+10, 7 + pulse/2, 0, Math.PI*2);
                ctx.fill();
            }

            if (activeAddons.obstacles) {
                ctx.shadowBlur = 0;
                ctx.fillStyle  = '#4d0000';
                obstacles.forEach(o => {
                    let x = o.x*TILE_SIZE, y = o.y*TILE_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(x+10, y); ctx.lineTo(x+20, y+20); ctx.lineTo(x, y+20);
                    ctx.fill();
                });
            }

            const drawSnake = (snake, color) => {
                if (snake.dead) return;
                ctx.fillStyle   = color;
                ctx.shadowBlur  = 5;
                ctx.shadowColor = color;
                snake.body.forEach(seg => {
                    let x = seg.x*TILE_SIZE, y = seg.y*TILE_SIZE;
                    ctx.beginPath();
                    ctx.moveTo(x+10, y); ctx.lineTo(x+20, y+10);
                    ctx.lineTo(x+10, y+20); ctx.lineTo(x, y+10);
                    ctx.fill();
                });
            };
            drawSnake(p1, '#ff3300');
            if (isMultiplayer) drawSnake(p2, '#ffcc00');

            if (hunter.active) {
                ctx.fillStyle   = '#fff';
                ctx.shadowBlur  = 20;
                ctx.shadowColor = '#ff0000';
                ctx.beginPath();
                ctx.arc(hunter.x*TILE_SIZE+10, hunter.y*TILE_SIZE+10, 9, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(hunter.x*TILE_SIZE+10, hunter.y*TILE_SIZE+10, 3, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;
        }

        // ── PLANTS VS ZOMBIES ─────────────────────────────────────────────
        function drawPvZ() {
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(45, 90, 39, 0.3)';
            for (let x = 0; x < canvas.width;  x += TILE_SIZE*2) {
                for (let y = 0; y < canvas.height; y += TILE_SIZE*2) {
                    ctx.beginPath();
                    ctx.arc(x+TILE_SIZE, y+TILE_SIZE, TILE_SIZE/3, 0, Math.PI*2);
                    ctx.fill();
                }
            }
            if (!gameLoop) return;

            if (activeAddons.maiden) {
                ctx.fillStyle   = '#8b4513';
                ctx.shadowBlur  = 5;
                ctx.shadowColor = '#8b4513';
                for (let i = 0; i < maidenProgress; i++) {
                    let mx = maidenSpiral[i].x*TILE_SIZE, my = maidenSpiral[i].y*TILE_SIZE;
                    ctx.beginPath();
                    ctx.arc(mx+10, my+10, 8, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(mx+7, my+7, 2, 0, Math.PI*2);
                    ctx.arc(mx+13, my+7, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#8b4513';
                }
                ctx.shadowBlur = 0;
            }

            if (food.x !== -999) {
                ctx.fillStyle   = '#ffcc00';
                ctx.shadowBlur  = 10;
                ctx.shadowColor = '#ffcc00';
                for (let i = 0; i < 8; i++) {
                    let angle = (i * Math.PI) / 4;
                    ctx.beginPath();
                    ctx.moveTo(food.x*TILE_SIZE+10, food.y*TILE_SIZE+10);
                    ctx.lineTo(food.x*TILE_SIZE+10 + Math.cos(angle)*12, food.y*TILE_SIZE+10 + Math.sin(angle)*12);
                    ctx.stroke();
                }
                ctx.fillStyle = '#8b4513';
                ctx.beginPath();
                ctx.arc(food.x*TILE_SIZE+10, food.y*TILE_SIZE+10, 6, 0, Math.PI*2);
                ctx.fill();
            }
            ctx.shadowBlur = 0;

            if (activeAddons.obstacles) {
                ctx.fillStyle   = '#654321';
                ctx.strokeStyle = '#8b4513';
                ctx.lineWidth   = 2;
                obstacles.forEach(o => {
                    let ox = o.x*TILE_SIZE, oy = o.y*TILE_SIZE;
                    ctx.beginPath();
                    ctx.arc(ox+10, oy+10, 9, 0, Math.PI*2);
                    ctx.fill(); ctx.stroke();
                    ctx.fillStyle = '#8b4513';
                    ctx.beginPath();
                    ctx.arc(ox+7,  oy+7, 2, 0, Math.PI*2);
                    ctx.arc(ox+13, oy+7, 2, 0, Math.PI*2);
                    ctx.arc(ox+10, oy+3, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#654321';
                });
            }

            const drawSnake = (snake, color) => {
                if (snake.dead) return;
                ctx.fillStyle   = color;
                ctx.shadowColor = color;
                snake.body.forEach((seg, i) => {
                    ctx.shadowBlur = i === 0 ? 10 : 5;
                    let x = seg.x*TILE_SIZE, y = seg.y*TILE_SIZE;
                    ctx.beginPath();
                    ctx.arc(x+10, y+10, 9, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = '#000';
                    ctx.beginPath();
                    ctx.arc(x+7,  y+7, 2, 0, Math.PI*2);
                    ctx.arc(x+13, y+7, 2, 0, Math.PI*2);
                    ctx.fill();
                    ctx.fillStyle = color;
                });
            };
            drawSnake(p1, '#76c843');
            if (isMultiplayer) drawSnake(p2, '#4caf50');

            if (hunter.active) {
                ctx.fillStyle   = '#556b2f';
                ctx.shadowBlur  = 10;
                ctx.shadowColor = '#556b2f';
                ctx.beginPath();
                ctx.arc(hunter.x*TILE_SIZE+10, hunter.y*TILE_SIZE+10, 9, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = '#ffcc00';
                ctx.beginPath();
                ctx.arc(hunter.x*TILE_SIZE+7,  hunter.y*TILE_SIZE+7, 2, 0, Math.PI*2);
                ctx.arc(hunter.x*TILE_SIZE+13, hunter.y*TILE_SIZE+7, 2, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        /* ═══════════════════════════════════════════════════════════════
           TOUCH CONTROLS
        ═══════════════════════════════════════════════════════════════ */
        let touchStartX = 0;
        let touchStartY = 0;
        const SWIPE_THRESHOLD = 25; // minimum pixels to count as a swipe

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.changedTouches[0].clientX;
            touchStartY = e.changedTouches[0].clientY;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            const endX = e.changedTouches[0].clientX;
            const endY = e.changedTouches[0].clientY;
            handleSwipe(touchStartX, touchStartY, endX, endY);
        }, { passive: false });

        // FIX: Proper swipe detection with minimum distance check
        function handleSwipe(startX, startY, endX, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;
            const absX  = Math.abs(diffX);
            const absY  = Math.abs(diffY);

            // FIX: Must meet minimum distance to register as swipe (was missing!)
            if (Math.max(absX, absY) < SWIPE_THRESHOLD) return;

            // Pick dominant direction (no diagonal ambiguity)
            if (absX >= absY) {
                handlePlayerInput(diffX > 0 ? 'RIGHT' : 'LEFT');
            } else {
                handlePlayerInput(diffY > 0 ? 'DOWN' : 'UP');
            }
        }

        function handlePlayerInput(direction) {
            if (gameState !== 'PLAYING') return;

            if (p1 && !p1.dead) {
                let last = p1.inputQueue.length > 0 ? p1.inputQueue[p1.inputQueue.length - 1] : p1.dir;
                if (p1.inputQueue.length < 2) {
                    if      (direction === 'UP'    && last !== 'DOWN'  && last !== 'UP')    p1.inputQueue.push('UP');
                    else if (direction === 'DOWN'  && last !== 'UP'    && last !== 'DOWN')  p1.inputQueue.push('DOWN');
                    else if (direction === 'LEFT'  && last !== 'RIGHT' && last !== 'LEFT')  p1.inputQueue.push('LEFT');
                    else if (direction === 'RIGHT' && last !== 'LEFT'  && last !== 'RIGHT') p1.inputQueue.push('RIGHT');
                }
            }

            if (isMultiplayer && p2 && !p2.dead) {
                let last2 = p2.inputQueue.length > 0 ? p2.inputQueue[p2.inputQueue.length - 1] : p2.dir;
                if (p2.inputQueue.length < 2) {
                    if      (direction === 'UP'    && last2 !== 'DOWN'  && last2 !== 'UP')    p2.inputQueue.push('UP');
                    else if (direction === 'DOWN'  && last2 !== 'UP'    && last2 !== 'DOWN')  p2.inputQueue.push('DOWN');
                    else if (direction === 'LEFT'  && last2 !== 'RIGHT' && last2 !== 'LEFT')  p2.inputQueue.push('LEFT');
                    else if (direction === 'RIGHT' && last2 !== 'LEFT'  && last2 !== 'RIGHT') p2.inputQueue.push('RIGHT');
                }
            }
        }

        /* ── D-PAD LISTENERS ───────────────────────────────────────────── */
        ['up','down','left','right'].forEach(dir => {
            const btn = document.getElementById('dpad-' + dir);
            if (!btn) return;
            // Use both touchstart and pointerdown for instant response
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                e.stopPropagation();
                handlePlayerInput(dir.toUpperCase());
            }, { passive: false });
            btn.addEventListener('mousedown', (e) => {
                handlePlayerInput(dir.toUpperCase());
            });
        });

        /* ═══════════════════════════════════════════════════════════════
           KEYBOARD CONTROLS
        ═══════════════════════════════════════════════════════════════ */
        document.addEventListener('keydown', (event) => {
            const key = event.key;
            if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(key)) {
                event.preventDefault();
            }

            if (gameState === 'MENU') {
                if (key === ' ') {
                    startGame();
                } else if (key === 'ArrowUp' || key === 'ArrowDown') {
                    let idx = difficultiesList.indexOf(currentDifficulty);
                    if (key === 'ArrowDown') idx = (idx + 1) % difficultiesList.length;
                    else                     idx = (idx - 1 + difficultiesList.length) % difficultiesList.length;
                    setDifficulty(difficultiesList[idx]);
                } else if (key === 'AltGraph' || event.code === 'AltRight') {
                    setMode(isMultiplayer ? 'single' : 'multi');
                } else if (key === '+' || key === '-') {
                    let idx = themesList.indexOf(currentTheme);
                    if (key === '+') idx = (idx + 1) % themesList.length;
                    else             idx = (idx - 1 + themesList.length) % themesList.length;
                    document.getElementById('themeSelect').value = themesList[idx];
                    changeTheme(themesList[idx]);
                } else if (key === '1') { toggleAddon('obstacles'); }
                  else if (key === '2') { toggleAddon('hunger'); }
                  else if (key === '3') { toggleAddon('maiden'); }
                return;
            }

            if (gameState === 'GAMEOVER') {
                if (key === ' ' || key === 'Enter') startGame();
                else if (key === 'Control')         showMenu();
                return;
            }

            if (gameState !== 'PLAYING') return;

            // Player 1 (arrow keys)
            if (p1 && !p1.dead) {
                let last = p1.inputQueue.length > 0 ? p1.inputQueue[p1.inputQueue.length - 1] : p1.dir;
                if (p1.inputQueue.length < 2) {
                    if      (key === 'ArrowUp'    && last !== 'DOWN'  && last !== 'UP')    p1.inputQueue.push('UP');
                    else if (key === 'ArrowDown'  && last !== 'UP'    && last !== 'DOWN')  p1.inputQueue.push('DOWN');
                    else if (key === 'ArrowLeft'  && last !== 'RIGHT' && last !== 'LEFT')  p1.inputQueue.push('LEFT');
                    else if (key === 'ArrowRight' && last !== 'LEFT'  && last !== 'RIGHT') p1.inputQueue.push('RIGHT');
                }
            }

            // Player 2 (WASD)
            if (isMultiplayer && p2 && !p2.dead) {
                let last2 = p2.inputQueue.length > 0 ? p2.inputQueue[p2.inputQueue.length - 1] : p2.dir;
                const k = key.toLowerCase();
                if (p2.inputQueue.length < 2) {
                    if      (k === 'w' && last2 !== 'DOWN'  && last2 !== 'UP')    p2.inputQueue.push('UP');
                    else if (k === 's' && last2 !== 'UP'    && last2 !== 'DOWN')  p2.inputQueue.push('DOWN');
                    else if (k === 'a' && last2 !== 'RIGHT' && last2 !== 'LEFT')  p2.inputQueue.push('LEFT');
                    else if (k === 'd' && last2 !== 'LEFT'  && last2 !== 'RIGHT') p2.inputQueue.push('RIGHT');
                }
            }
        });

        // ── INIT ──────────────────────────────────────────────────────────
        changeTheme('cyberpunk');
        updateMenuSelection();
    </script>
</body>
</html>
